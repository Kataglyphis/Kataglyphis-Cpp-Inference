root = .
search-path = build

filter = Src/*
filter = include/*

exclude-directories = install
exclude-directories = ExternalLib
exclude-directories = .*_deps
exclude-directories = Test
exclude-directories = resources
exclude = .*/(ExternalLib|build[^/]*/_deps|_deps|Test|tests)/.*

print-summary = yes

html-details = ./build/coverage.html

cobertura-pretty = yes
cobertura = build/cobertura.xml

#TBD delete-gcov-files = yes