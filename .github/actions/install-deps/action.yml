name: "Install deps"
description: "Shared install deps logic used by workflow jobs"

inputs:
  vulkan-version:
    description: 'Vulkan SDK version (e.g. 1.4.321.1)'
    required: false
    default: '1.4.321.1'
  run-setup-script:
    description: 'If "true", chmod +x and run Scripts/Linux/setup-dependencies.sh'
    required: false
    default: 'false'
  install-uv:
    description: 'If "true", install Astral uv package manager'
    required: false
    default: 'true'

runs:
  using: "composite"
  steps:
    - shell: bash
      run: |
        set -euo pipefail

        VULKAN_VERSION="${{ inputs.vulkan-version }}"
        RUN_SETUP_SCRIPT="${{ inputs.run-setup-script }}"
        INSTALL_UV="${{ inputs.install-uv }}"

        # --- Source ContainerHub core library for platform helpers ---
        CONTAINER_HUB_CORE="${GITHUB_WORKSPACE}/ExternalLib/Kataglyphis-ContainerHub/linux/scripts/01-core"
        if [ -f "${CONTAINER_HUB_CORE}/common.sh" ]; then
          # shellcheck disable=SC1091
          source "${CONTAINER_HUB_CORE}/common.sh"
          echo "[INFO] ContainerHub core library loaded"
        else
          # Minimal inline fallbacks
          info()  { printf '[INFO]  %s\n' "$*"; }
          warn()  { printf '[WARN]  %s\n' "$*" >&2; }
          die()   { printf '[ERROR] %s\n' "$*" >&2; exit 1; }
          arch_oci() {
            case "$(uname -m)" in
              x86_64|amd64)   printf 'amd64'   ;;
              aarch64|arm64)  printf 'arm64'   ;;
              *)              uname -m         ;;
            esac
          }
          warn "ContainerHub core library not found, using minimal fallbacks"
        fi

        echo "/usr/bin" >> "$GITHUB_PATH"

        # Detect where cargo is installed and add that dir to PATH for subsequent steps
        CARGO_BIN_DIR=$(dirname "$(command -v cargo 2>/dev/null || true)")
        if [ -n "$CARGO_BIN_DIR" ]; then
          info "Found cargo at: $CARGO_BIN_DIR"
          echo "$CARGO_BIN_DIR" >> "$GITHUB_PATH"
          export PATH="$CARGO_BIN_DIR:$PATH"
        else
          warn "cargo not found in PATH — falling back to \$HOME/.cargo/bin"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.cargo/bin:$PATH"
        fi

        # Optionally run the repository's setup script (release job used this previously)
        if [ "$RUN_SETUP_SCRIPT" = "true" ]; then
          if [ -f "Scripts/Linux/setup-dependencies.sh" ]; then
            sudo chmod +x Scripts/Linux/setup-dependencies.sh
            sudo ./Scripts/Linux/setup-dependencies.sh "${VULKAN_VERSION}"
          else
            warn "Scripts/Linux/setup-dependencies.sh not found, skipping."
          fi
        fi

        # Optionally install Astral uv package manager
        if [ "$INSTALL_UV" = "true" ]; then
          info "Installing Astral uv package manager..."
          curl -LsSf https://astral.sh/uv/install.sh | sh
          
          # Add uv to PATH
          if [ -d "$HOME/.local/bin" ]; then
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            export PATH="$HOME/.local/bin:$PATH"
          fi
          
          # Verify installation
          if command -v uv >/dev/null 2>&1; then
            info "uv installed successfully"
            uv --version
          else
            die "uv installation failed"
          fi
        fi

        # ensure rustup has a default toolchain
        if command -v rustup >/dev/null 2>&1; then
          if ! rustup show active-toolchain >/dev/null 2>&1; then
            rustup toolchain install stable
            rustup default stable
          fi
        fi

        # expose rustc path for later use in the workflow
        RUSTC_PATH=$(command -v rustc || true)
        if [ -n "$RUSTC_PATH" ]; then
          echo "Rust_COMPILER=$RUSTC_PATH" >> "$GITHUB_ENV"
          info "Found rustc at: $RUSTC_PATH"
        else
          die "rustc still not found after installation"
        fi

        # Add Vulkan SDK bin dir — use ContainerHub's arch_oci + map to uname-style
        OCI_ARCH="$(arch_oci)"
        case "${OCI_ARCH}" in
          amd64) SDK_ARCH="x86_64"  ;;
          arm64) SDK_ARCH="aarch64" ;;
          *)     die "Unsupported architecture: ${OCI_ARCH}" ;;
        esac

        echo "/${VULKAN_VERSION}/${SDK_ARCH}/bin" >> "$GITHUB_PATH"
        
        # quick checks
        command -v cargo || true
        cargo --version || true
        info "PATH (this step): $PATH"

        # Install packaging dependencies via ContainerHub's apt helpers if available
        if command -v apt_install >/dev/null 2>&1; then
          require_sudo
          apt_install file dpkg-dev fakeroot binutils
        else
          sudo apt-get update
          sudo apt-get install -y file dpkg-dev fakeroot binutils
        fi
