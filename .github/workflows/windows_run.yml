name: CMake on Windows MSVC/Clang x64

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  BUILD_DIR_RELEASE: "build-clangcl-release"
  GHCR_IMAGE_WIN: ghcr.io/kataglyphis/kataglyphis_beschleuniger:winamd64

defaults:
  run:
    shell: pwsh # Set PowerShell as default shell for all steps

jobs:
  build:
    runs-on: windows-2025
    steps:

      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          submodules: recursive

      # my windows container is quite big ... so remove runner packages for enough
      # dis space
      - name: Cleanup disk space
        uses: ./.github/actions/cleanup-disk-space

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || github.token }}

      - name: Pull container image
        run: |
          docker pull "${{ env.GHCR_IMAGE_WIN }}"

      - name: Build in container via wrapper
        run: |
          .\scripts\windows\start_build.ps1 -ProjectRoot "${{ github.workspace }}" -Image "${{ env.GHCR_IMAGE_WIN }}" -CpuCount "32" -Memory "48g"

      - name: Run debug build on host
        run: |
          .\scripts\windows\start_debug.ps1 -ProjectRoot "${{ github.workspace }}"

      - name: Run profile build on host
        run: |
          .\scripts\windows\start_profile.ps1 -ProjectRoot "${{ github.workspace }}"

      - name: Run release build on host
        run: |
          .\scripts\windows\start_release.ps1 -ProjectRoot "${{ github.workspace }}"

      - name: Upload Installers & Zip (container build)
        uses: actions/upload-artifact@v6.0.0
        with:
          name: windows-installers-container
          path: |
            ${{ github.workspace }}/${{ env.BUILD_DIR_RELEASE }}/*.msi
            ${{ github.workspace }}/${{ env.BUILD_DIR_RELEASE }}/*.exe
            ${{ github.workspace }}/${{ env.BUILD_DIR_RELEASE }}/*.zip
